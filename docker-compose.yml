services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sumaya
      POSTGRES_PASSWORD: sumaya_secure_2026
      POSTGRES_DB: sumayacare360
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sumaya -d sumayacare360"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sumaya
      MINIO_ROOT_PASSWORD: sumaya_minio_2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://sumaya:sumaya_secure_2026@postgres:5432/sumayacare360
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: sumaya-care-360-dev-jwt-secret-change-in-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: sumaya
      S3_SECRET_KEY: sumaya_minio_2026
      S3_BUCKET: sumaya-docs
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://web:80
      APP_ENV: development
      SEED_ON_START: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://sumaya:sumaya_secure_2026@postgres:5432/sumayacare360
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: sumaya-care-360-dev-jwt-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m app.worker

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
