# SUMAYA Care 360 — Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → connect this repo

databases:
  - name: sumayacare360-db
    plan: free
    databaseName: sumayacare360
    user: sumaya

services:
  # Redis — notification queue / cache
  - type: keyvalue
    name: sumayacare360-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
    maxmemoryPolicy: allkeys-lru

  # FastAPI backend
  - type: web
    name: sumayacare360-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m app.db.seed
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: APP_ENV
        value: production
      - key: SEED_ON_START
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: sumayacare360-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sumayacare360-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: CORS_ORIGINS
        value: https://sumayacare360-web.onrender.com
      # Optional: override with S3-compatible storage (AWS S3, Cloudflare R2, etc.)
      - key: S3_ENDPOINT
        value: ""
      - key: S3_ACCESS_KEY
        value: ""
      - key: S3_SECRET_KEY
        value: ""
      - key: S3_BUCKET
        value: sumaya-docs

  # React frontend (Vite static site)
  - type: web
    name: sumayacare360-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && VITE_API_BASE="$TEMP_API_URL/api/v1" npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: TEMP_API_URL
        fromService:
          type: web
          name: sumayacare360-api
          envVarKey: RENDER_EXTERNAL_URL
