# SUMAYA Care 360 - Render Blueprint

databases:
  - name: sumayacare360-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: sumayacare360-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.db.upgrade && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sumayacare360-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://sumayacare360-web.onrender.com

  - type: web
    name: sumayacare360-web
    runtime: static
    buildCommand: cd frontend && npm install && VITE_API_BASE=https://sumayacare360-api.onrender.com/api/v1 npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
